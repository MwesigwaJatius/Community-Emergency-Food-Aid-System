<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Agent Interface</title>
</head>
<body>
    <h1>Delivery Agent Interface</h1>
    <section>
        <h2>Assigned Deliveries</h2>
        <table>
            <thead>
                <tr>
                    <th>Delivery ID</th>
                    <th>Recipient Name</th>
                    <th>Address</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <!-- Example row -->
                <tr>
                    <td>1</td>
                    <td>John Doe</td>
                    <td>123 Main St, City</td>
                    <td>Pending</td>
                </tr>
            </tbody>
        </table>
    </section>
    <section>
        <h2>OTP Verification</h2>
        <form id="otp-form">
            <label for="otp">Enter OTP:</label>
            <input type="text" id="otp" name="otp" required>
            <button type="submit">Verify</button>
        </form>
    </section>
    <script>
        // Add your JavaScript for OTP verification and managing deliveries here
    </script>
</body>
</html>
