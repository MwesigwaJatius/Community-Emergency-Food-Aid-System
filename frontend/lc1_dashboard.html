<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LC1 Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>LC1 Dashboard</h1>
        <p>Review and Approve Food Aid Requests</p>
    </header>
    <main>
        <section id="requests">
            <h2>Food Aid Requests</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Requester Name</th>
                        <th>Request Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Requests will be populated here -->
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Community Emergency Food Aid System</p>
    </footer>
</body>
</html>
